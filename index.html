<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fyr by Mbappboy</title>
  <style>
    .game {
      overflow: hidden;
      max-width: 600px;
      max-height: 450px;
      position: relative;
      background: rgb(52, 166, 251);
      margin: 20px auto;
      border: 4px solid #222;
    }
    .background { background: rgb(52, 166, 251); table-layout: fixed; border-spacing: 0; }
    .background td { padding: 0; }
    .lava { background: rgb(255, 100, 100); }
    .wall { background: white; }
    .actor { position: absolute; }
    .coin { background: rgb(241, 229, 89); border-radius: 50%; }
    .player { background: #d00000; }
    .lost .player { background: rgb(160, 64, 64); }
    .won .player { box-shadow: -4px -7px 8px white, 4px -7px 8px white; }
    #copyright { font-family: Segoe UI, Arial; color: #292929;}
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
    /* --- 1. THE LEVELS --- */
    var LEVEL_MAPS = [
      [
        "                      ",
        "                      ",
        "  x              = x  ",
        "  x         o o    x  ",
        "  x @      xxxxx   x  ",
        "  xxxxx            x  ",
        "      x!!!!!!!!!!!!x  ",
        "      xxxxxxxxxxxxxx  ",
        "                      "
      ],
      [
        "                      ",
        "x      o      o      x",
        "x @  xxxxx    xxx    x",
        "x           o       =x",
        "x        xxxxxx     xx",
        "x    xx           o  x",
        "xxxxxx        xx!!!! x",
        "x    x  o  ox        x",
        "xxxxxxxxxxxxxxxxxxxxxx"
      ],
      [
        "                      ",
        "      o o o o o       ",
        "  @   xxxxxxxxx       ",
        "  xxxx         xxx!x  ",
        "     x                ",
        "     x   o  x    o    ",
        "     x  !xx x   xxx   ",
        "     xxxxxxxxxxxxxxxxx",
        "!!!!!!!!!!!!!!!!!!!!!!"
      ],
      [
        "                      ",
        "                      ",
        "                      ",
        "                      ",
        "             o        ",
        "@                   o=",
        "xxxx xxxxx xxx xxxx xx",
        "                      ",
        "!!!!!!!!!!!!!!!!!!!!!!"
      ],
      [
        "                      ",
        "        xv  o        =",
        "            x    v     ",
        "  x      x            ",
        "      x               ",
        "@   ox                ",
        "xxxx xxxxx xxx xxxx xx",
        "                      ",
        "!!!!!!!!!!!!!!!!!!!!!!"
      ]
    ];

    /* --- 2. THE ENGINE --- */
    function Vector(x, y) { this.x = x; this.y = y; }
    Vector.prototype.plus = function(other) { return new Vector(this.x + other.x, this.y + other.y); };
    Vector.prototype.times = function(factor) { return new Vector(this.x * factor, this.y * factor); };

    function Player(pos) {
      this.pos = pos.plus(new Vector(0, -0.5));
      this.size = new Vector(0.8, 1.5);
      this.speed = new Vector(0, 0);
    }
    Player.prototype.type = "player";

    function Lava(pos, ch) {
      this.pos = pos; this.size = new Vector(1, 1);
      if (ch == "=") this.speed = new Vector(2, 0);
      else if (ch == "|") this.speed = new Vector(0, 2);
      else if (ch == "v") { this.speed = new Vector(0, 3); this.repeatPos = pos; }
    }
    Lava.prototype.type = "lava";

    function Coin(pos) {
      this.basePos = this.pos = pos.plus(new Vector(0.2, 0.1));
      this.size = new Vector(0.6, 0.6);
      this.wobble = Math.random() * Math.PI * 2;
    }
    Coin.prototype.type = "coin";

    var actorChars = { "@": Player, "o": Coin, "=": Lava, "|": Lava, "v": Lava };

    function Level(plan) {
      this.width = plan[0].length;
      this.height = plan.length;
      this.grid = []; this.actors = [];
      for (var y = 0; y < this.height; y++) {
        var line = plan[y], gridLine = [];
        for (var x = 0; x < this.width; x++) {
          var ch = line[x], fieldType = null;
          var Actor = actorChars[ch];
          if (Actor) this.actors.push(new Actor(new Vector(x, y), ch));
          else if (ch == "x") fieldType = "wall";
          else if (ch == "!") fieldType = "lava";
          gridLine.push(fieldType);
        }
        this.grid.push(gridLine);
      }
      this.player = this.actors.filter(a => a.type == "player")[0];
      this.status = this.finishDelay = null;
    }
    Level.prototype.isFinished = function() { return this.status != null && this.finishDelay < 0; };

    /* --- 3. PHYSICS & COLLISION --- */
    Level.prototype.obstacleAt = function(pos, size) {
      var xStart = Math.floor(pos.x), xEnd = Math.ceil(pos.x + size.x);
      var yStart = Math.floor(pos.y), yEnd = Math.ceil(pos.y + size.y);
      if (xStart < 0 || xEnd > this.width || yStart < 0) return "wall";
      if (yEnd > this.height) return "lava";
      for (var y = yStart; y < yEnd; y++) {
        for (var x = xStart; x < xEnd; x++) {
          var fieldType = this.grid[y][x];
          if (fieldType) return fieldType;
        }
      }
    };

    Level.prototype.actorAt = function(actor) {
      for (var i = 0; i < this.actors.length; i++) {
        var other = this.actors[i];
        if (other != actor &&
            actor.pos.x + actor.size.x > other.pos.x && actor.pos.x < other.pos.x + other.size.x &&
            actor.pos.y + actor.size.y > other.pos.y && actor.pos.y < other.pos.y + other.size.y)
          return other;
      }
    };

    Level.prototype.animate = function(step, keys) {
      if (this.status != null) this.finishDelay -= step;
      while (step > 0) {
        var thisStep = Math.min(step, 0.05);
        this.actors.forEach(a => a.act(thisStep, this, keys));
        step -= thisStep;
      }
    };

    Lava.prototype.act = function(step, level) {
      var newPos = this.pos.plus(this.speed.times(step));
      if (!level.obstacleAt(newPos, this.size)) this.pos = newPos;
      else if (this.repeatPos) this.pos = this.repeatPos;
      else this.speed = this.speed.times(-1);
    };

    Coin.prototype.act = function(step) {
      this.wobble += step * 8;
      this.pos = this.basePos.plus(new Vector(0, Math.sin(this.wobble) * 0.07));
    };

    Player.prototype.act = function(step, level, keys) {
      this.speed.x = 0;
      if (keys.left) this.speed.x -= 7;
      if (keys.right) this.speed.x += 7;
      var nextX = this.pos.plus(new Vector(this.speed.x * step, 0));
      var obsX = level.obstacleAt(nextX, this.size);
      if (obsX) level.playerTouched(obsX); else this.pos = nextX;

      this.speed.y += step * 30;
      var nextY = this.pos.plus(new Vector(0, this.speed.y * step));
      var obsY = level.obstacleAt(nextY, this.size);
      if (obsY) {
        level.playerTouched(obsY);
        if (keys.up && this.speed.y > 0) this.speed.y = -17; else this.speed.y = 0;
      } else this.pos = nextY;

      let other = level.actorAt(this);
      if (other) level.playerTouched(other.type, other);
      if (level.status == "lost") { this.pos.y += step; this.size.y -= step; }
    };

    Level.prototype.playerTouched = function(type, actor) {
      if (type == "lava" && this.status == null) {
        this.status = "lost"; this.finishDelay = 1;
      } else if (type == "coin") {
        this.actors = this.actors.filter(a => a != actor);
        if (!this.actors.some(a => a.type == "coin")) {
          this.status = "won"; this.finishDelay = 1;
        }
      }
    };

    /* --- 4. DISPLAY --- */
    function elt(name, className) {
      var e = document.createElement(name);
      if (className) e.className = className;
      return e;
    }

    function DOMDisplay(parent, level) {
      this.wrap = parent.appendChild(elt("div", "game"));
      this.level = level;
      this.wrap.appendChild(this.drawBackground());
      this.actorLayer = null;
      this.drawFrame();
    }

    DOMDisplay.prototype.drawBackground = function() {
      var table = elt("table", "background");
      table.style.width = this.level.width * 20 + "px";
      this.level.grid.forEach(row => {
        var rowElt = table.appendChild(elt("tr"));
        rowElt.style.height = "20px";
        row.forEach(type => rowElt.appendChild(elt("td", type)));
      });
      return table;
    };

    DOMDisplay.prototype.drawFrame = function() {
      if (this.actorLayer) this.wrap.removeChild(this.actorLayer);
      var wrap = elt("div");
      this.level.actors.forEach(actor => {
        var rect = wrap.appendChild(elt("div", "actor " + actor.type));
        rect.style.width = actor.size.x * 20 + "px";
        rect.style.height = actor.size.y * 20 + "px";
        rect.style.left = actor.pos.x * 20 + "px";
        rect.style.top = actor.pos.y * 20 + "px";
      });
      this.actorLayer = this.wrap.appendChild(wrap);
      this.wrap.className = "game " + (this.level.status || "");
    };

    DOMDisplay.prototype.clear = function() { this.wrap.parentNode.removeChild(this.wrap); };

    /* --- 5. RUNTIME --- */
    var arrowCodes = {37: "left", 38: "up", 39: "right"};
    function trackKeys(codes) {
      var pressed = Object.create(null);
      function handler(event) {
        if (codes.hasOwnProperty(event.keyCode)) {
          pressed[codes[event.keyCode]] = event.type == "keydown";
          event.preventDefault();
        }
      }
      addEventListener("keydown", handler); addEventListener("keyup", handler);
      return pressed;
    }

    function runAnimation(frameFunc) {
      var lastTime = null;
      function frame(time) {
        if (lastTime != null) {
          var timeStep = Math.min(time - lastTime, 100) / 1000;
          if (frameFunc(timeStep) === false) return;
        }
        lastTime = time;
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    var arrows = trackKeys(arrowCodes);

    function runLevel(level, Display, andThen) {
      var display = new Display(document.getElementById("game-container"), level);
      runAnimation(step => {
        level.animate(step, arrows);
        display.drawFrame();
        if (level.isFinished()) {
          display.clear();
          if (andThen) andThen(level.status);
          return false;
        }
      });
    }

    function runGame(plans, Display) {
  function startLevel(n) {
    runLevel(new Level(plans[n]), Display, status => {
      if (status == "lost") {
        startLevel(n);
      } else if (n < plans.length - 1) { // This must be exactly plans.length - 1
        startLevel(n + 1);
      } else {
        alert("Congratulations! You've beaten all levels!");
      }
    });
  }
  startLevel(0);
}

    // Launch with the array of maps
    runGame(LEVEL_MAPS, DOMDisplay);
  </script>

</body>
</html>
